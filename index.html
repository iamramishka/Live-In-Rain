    input[type=range]::-ms-fill-lower {

      border: 0px solid #000000;
      border-radius: 0px;
      box-shadow: 0px 0px 0px #310000, 0px 0px 0px #4b0000;
    }

    input[type=range]::-ms-fill-upper {
      background: #ffffff;
      border: 0px solid #000000;
      border-radius: 0px;
      box-shadow: 0px 0px 0px #310000, 0px 0px 0px #4b0000;
    }

    input[type=range]::-ms-thumb {
      box-shadow: 0px 0px 0px #000000, 0px 0px 0px #0d0d0d;

      background: #ffffff;
    }

      background: #ffffff;

<body>
  <div id="root" style="z-index:-10000;">
    <canvas id="canvas"></canvas>
    <p id="loading"></p>
  </div>
  <script>
    const canvas = document.querySelector("#canvas");
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    const backgrounds = [
      "./i/bz/10.jpg",
      "./i/bz/11.jpg",
      "./i/bz/12.jpg",
      "./i/bz/13.jpg",
      "./i/bz/14.jpg"
    ];
    const randomBackground = backgrounds[Math.floor(Math.random() * backgrounds.length)];

    const raindropFx = new RaindropFX({
      canvas: canvas,
      background: randomBackground,
    });

    window.onresize = () => {
      const rect = canvas.getBoundingClientRect();
      raindropFx.resize(rect.width, rect.height);
    }

    raindropFx.start();
  </script>








  <div class="center-container">









    <div class="center-block">




      <div id="audioplayerskin"><button id="pButton" class="play" onclick="playAudio();"></button>
        <div id="volume_control"><input type="range" oninput="setVolume(this.value)" onchange="setVolume(this.value)"
            id="rngVolume" min="0" max="1" step="0.01" value="1"></div>
      </div><audio id="audioplayer" loop="loop">
        <source src="./media/0.m4a" type="audio/mp4" />
        <source src="./media/0.ogg" type="audio/ogg" />
        <source src="./media/0.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>
      <script>
        var music = document.getElementById('audioplayer');
        function playAudio() {
          if (music.paused) {
            music.play();
            pButton.className = "";
            pButton.className = "pause";
          } else {
            music.pause();
            pButton.className = "";
            pButton.className = "play";
          }
        }
        function setVolume(volume) { music.volume = volume; }
      </script>






      <h1>Live In Rain</h1>
      <p>Find your peace in the storm.</p>


      <br />
      <p>Created By<br>Ramishka Madhushan</p>


    </div>
  </div>
